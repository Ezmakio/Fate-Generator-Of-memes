<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fate Generator Pro+</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #fgo-viewport {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            overflow: hidden;
            background-image: url('https://static.atlasacademy.io/NA/Back/back21100.png');
            background-size: cover;
            background-position: center;
        }

        .asset {
            position: absolute;
            background-repeat: no-repeat;
            opacity: 0.92;
        }

        /* --- INTERFAZ --- */
        
        #name-tag { 
            left: 0.75%; top: 67.33%; width: 28.38%; height: 9.11%; z-index: 10;
            background-image: url('Assets/name_tag_box.png');
            background-size: 100% 100%;
        }

        #text-box { 
            left: 2.75%; top: 74.00%; width: 97.13%; height: 22.89%; z-index: 9;
            background-image: url('Assets/text_box_bg.png');
            background-size: 100% 100%;
        }

        #log-icon { 
            left: 94%; top: 74.44%; width: 2.50%; height: 4.89%; z-index: 10;
            background-image: url('Assets/log_indicator.png');
            background-size: 100% 100%;
        }

        #skip-btn { 
            /* RESTAURADO Y CORREGIDO */
            left: 87.50%; top: 0.89%; width: 12.13%; height: 8.89%; z-index: 10;
            /* Asset oficial de Atlas Academy para un recorte limpio */
            background-image: url('https://static.atlasacademy.io/NA/Items/Common/6.png');
            background-size: 100% 100%;
            filter: drop-shadow(0px 0px 2px rgba(255,255,255,0.2));
        }

        #auto-btn { 
            /* MÁS PEQUEÑO Y MÁS A LA DERECHA */
            left: 93.8%; top: 82.8%; width: 3%; height: 6.5%; z-index: 10;
            background-image: url('Assets/auto_button.png');
            background-size: contain; /* Asegura que el botón no se deforme */
            background-position: center;
            /* Truco para limpiar los bordes claros que mencionas */
            background-origin: content-box;
            padding: 1px; /* Pequeño margen interno para el recorte */
        }

        /* --- TEXTO REFINADO CON NOTO SANS JP --- */
        #content-name {
            position: absolute;
            left: 5.5%; top: 68.8%; width: 22%; z-index: 11;
            color: #E0E0E0;
            /* Usando tu fuente Noto Sans JP (peso Bold para el nombre) */
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 700; 
            font-size: 1.8vw; 
            text-align: left;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        #content-dialogue {
            position: absolute;
            left: 6.5%; top: 79.5%; width: 85%; z-index: 11;
            color: #DFDFDF; 
            /* Usando tu fuente Noto Sans JP (peso Regular para el diálogo) */
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 400; /* Menos gruesa */
            font-size: 2.2vw; 
            line-height: 1.4;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div id="fgo-viewport">
        <div id="name-tag" class="asset"></div>
        <div id="text-box" class="asset"></div>
        <div id="log-icon" class="asset"></div>
        <div id="skip-btn" class="asset"></div>
        <div id="auto-btn" class="asset"></div>

        <div id="content-name">Jeanne d'Arc Alter</div>
        <div id="content-dialogue">
            If you heed the Grail's call, and obey my will and reason, then answer me.
        </div>
    </div>

</body>
</html>
