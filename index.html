<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fate Generator Pro Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #fgo-viewport {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            overflow: hidden;
            background-image: url('https://static.atlasacademy.io/NA/Back/back21100.png');
            background-size: cover;
            background-position: center;
        }

        .asset {
            position: absolute;
            background-repeat: no-repeat;
            background-size: 100% 100%;
            /* Mayor transparencia para emular la foto original */
            opacity: 0.85; 
        }

        /* --- INTERFAZ --- */
        
        #name-tag { 
            left: 0.75%; top: 67.33%; width: 28.38%; height: 9.11%; z-index: 10;
            background-image: url('Assets/name_tag_box.png');
        }

        #text-box { 
            left: 2.75%; top: 74.00%; width: 97.13%; height: 22.89%; z-index: 9;
            background-image: url('Assets/text_box_bg.png');
        }

        #log-icon { 
            left: 94%; top: 74.44%; width: 2.50%; height: 4.89%; z-index: 10;
            background-image: url('Assets/log_indicator.png');
        }

        #skip-btn { 
            left: 87.50%; top: 0.89%; width: 12.13%; height: 8.89%; z-index: 10;
            background-image: url('Assets/skip_button.png');
            /* SUAVIZADO DE BORDES: Doble sombra para ocultar el mal corte */
            filter: drop-shadow(0px 0px 1px rgba(255,255,255,0.4)) drop-shadow(0px 0px 4px rgba(0,0,0,0.5));
            image-rendering: auto;
        }

        #auto-btn { 
            left: 93.8%; top: 81.5%; width: 3%; height: 6.5%; z-index: 10;
            background-image: url('Assets/auto_button.png');
            background-size: contain;
            background-position: center;
        }

        /* --- TEXTO REFINADO (NOTO SANS JP) --- */
        #content-name {
            position: absolute;
            /* Más pegado al borde izquierdo del tag */
            left: 4.2%; top: 68.8%; width: 22%; z-index: 11;
            color: #DFDFDF;
            /* Igualamos a la fuente de abajo (menos gruesa) */
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 400; 
            font-size: 1.8vw; 
            text-align: left;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        #content-dialogue {
            position: absolute;
            /* Más pegado al borde izquierdo del cuadro */
            left: 4.5%; top: 79.5%; width: 88%; z-index: 11;
            color: #DFDFDF; 
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 400; 
            font-size: 2.2vw; 
            line-height: 1.4;
            letter-spacing: 0.01em;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div id="fgo-viewport">
        <div id="name-tag" class="asset"></div>
        <div id="text-box" class="asset"></div>
        <div id="log-icon" class="asset"></div>
        <div id="skip-btn" class="asset"></div>
        <div id="auto-btn" class="asset"></div>

        <div id="content-name">Jeanne d'Arc Alter</div>
        <div id="content-dialogue">
            If you heed the Grail's call, and obey my will and reason, then answer me.
        </div>
    </div>

</body>
</html>
