<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fate Generator Pro Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #fgo-viewport {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            overflow: hidden;
            background-image: url('https://static.atlasacademy.io/NA/Back/back21100.png');
            background-size: cover;
            background-position: center;
        }

        .asset {
            position: absolute;
            background-repeat: no-repeat;
        }

        /* --- INTERFAZ --- */
        
       #name-tag { 
    left: 2.75%; /* Alineado con el borde del textbox */
    top: 68.5%;  /* La posición bajadita que pediste */
    width: 28.38%; 
    height: 9.11%; 
    z-index: 10;
    background-image: url('Assets/name_tag_box.png');
    background-size: 100% 100%;
    opacity: 0.75;
}

        #text-box { 
            left: 2.75%; top: 74.00%; width: 97.13%; height: 22.89%; z-index: 9;
            background-image: url('Assets/text_box_bg.png');
            background-size: 100% 100%;
            opacity: 0.75;
        }

        #log-icon { 
            left: 94%; top: 74.44%; width: 2.50%; height: 4.89%; z-index: 10;
            background-image: url('Assets/log_indicator.png');
            background-size: 100% 100%;
            opacity: 0.9;
        }

   #skip-btn { 
    left: 87.50%; 
    top: 0.89%; 
    width: 12.13%; 
    height: 8.89%; 
    z-index: 10;
    background-image: url('Assets/skip_button.png');
    background-size: 100% 100%;
    
    /* --- ULTRASHARP REFINEMENT --- */
    /* Borde ultra fino de 0.8px para máxima elegancia */
    border: 0.8px solid rgba(255, 255, 255, 0.5); 
    border-radius: 50px; 

    /* Resplandor sutil que suaviza los bordes del asset original */
    box-shadow: inset 0 0 2px rgba(255, 255, 255, 0.2), 0 0 2px rgba(255, 255, 255, 0.3);
    
    /* Filtros para que el azul se vea más vibrante */
    filter: brightness(1.08) contrast(1.1);
    
    /* Forzamos suavizado por hardware para evitar el pixelado */
    transform: translateZ(0);
    -webkit-font-smoothing: antialiased;
    opacity: 0.95;
}

        #auto-btn { 
            left: 93.8%; top: 81.5%; width: 3%; height: 6.5%; z-index: 10;
            background-image: url('Assets/auto_button.png');
            background-size: contain;
            background-position: center;
            opacity: 0.9;
        }

        /* --- TEXTO RESTAURADO Y SUAVIZADO --- */
      #content-name {
    position: absolute;
    left: 5%;      /* Pegado a la izquierda dentro de su caja */
    top: 70.5%;    /* Cerca de la parte inferior */
    width: 22%; 
    z-index: 11;
    color: #F5F5F5; 
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400; 
    font-size: 2.2vw; 
    text-align: left; /* Volvemos a alineación a la izquierda */
    -webkit-text-stroke: 0;
    text-shadow: 2px 2px 3px rgba(0,0,0,0.9);
    opacity: 0.92;
}
        #content-dialogue {
            position: absolute;
            left: 6.5%; top: 79.5%; width: 85%; z-index: 11;
            /* VOLVEMOS AL BLANCO HUESO LIMPIO */
            color: #F5F5F5; 
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 400; 
            font-size: 2.2vw; 
            line-height: 1.4;
            letter-spacing: 0.01em;
            /* SIN BORDE, PERO CON SOMBRA GRUESA */
            -webkit-text-stroke: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            opacity: 0.9; /* Menos opacidad */
        }
    </style>
</head>
<body>

    <div id="fgo-viewport">
        <div id="name-tag" class="asset"></div>
        <div id="text-box" class="asset"></div>
        <div id="log-icon" class="asset"></div>
        <div id="skip-btn" class="asset"></div>
        <div id="auto-btn" class="asset"></div>

        <div id="content-name">Jeanne d'Arc Alter</div>
        <div id="content-dialogue">
            If you heed the Grail's call, and obey my will and reason, then answer me.
        </div>
    </div>

</body>
</html>
